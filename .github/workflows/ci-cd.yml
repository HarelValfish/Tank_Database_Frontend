name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write   # required for OIDC → AWS

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: tank-db
  ECR_REPO_NAME: tank-db-frontend

jobs:
  # ─── 1. BUILD (PR validation, no AWS needed) ─────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install & build
        run: npm ci && npm run build

  # ─── 2. PUSH TO ECR (main only) ──────────────────────────────────
  push:
    name: Push image
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image-uri.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URI output
        id: image-uri
        run: |
          echo "value=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false   # avoids OCI manifest list that can confuse ECR/kubectl
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_NAME }}:latest
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 3. DEPLOY TO EKS (main only) ───────────────────────────────
  deploy:
    name: Deploy to EKS
    needs: push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}

      - name: Rolling update
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ needs.push.outputs.image }} \
            -n tank-db
          kubectl rollout status deployment/frontend -n tank-db --timeout=120s
